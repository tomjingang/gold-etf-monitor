name: 黄金ETF + 伦敦金价格推送

on:
  schedule:
    # 每天北京时间9:30 (UTC 1:30)
    - cron: '30 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  push-gold-price:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install yfinance pandas requests
        
    - name: Get gold prices and generate notification
      run: |
        python3 .github/scripts/gold_price_push.py
        
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: gold-etf-data
        path: |
          gold_etf_*.csv
          push_notification.txt
          email_body.html
        retention-days: 30
        
    - name: Send email notification (Outlook)
      if: env.EMAIL_USERNAME != '' && env.EMAIL_PASSWORD != ''
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.office365.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: 📊 黄金ETF + 伦敦金价格推送 - ${{ github.run_number }}
        to: tanglichen_kaiser@outlook.com
        from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
        html_body: file://email_body.html
        convert_markdown: false
