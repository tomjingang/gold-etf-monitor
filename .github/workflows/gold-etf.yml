name: 黄金ETF + 伦敦金价格推送

on:
  schedule:
    # 每天北京时间9:30 (UTC 1:30)
    - cron: '30 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  push-gold-price:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install yfinance pandas requests
        
    - name: Get gold prices and push
      run: |
        python3 .github/scripts/gold_price_push.py
        
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: gold-etf-data
        path: |
          gold_etf_*.csv
          push_notification.txt
        retention-days: 30
